name: Unwind Visual Cortex - Scripting Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile
        run: |
          python -m compileall -q .
      - name: Smoke run
        run: |
          python scripting_agent_cli.py "Agentes con recibo técnico" --duration 30 --threshold 0 --max-iters 1 > /dev/null
